<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI YouTube Novel Factory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--accent2:#2563eb;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:20px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:18px;font-weight:600}
header h1 span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
#statusDot{width:10px;height:10px;border-radius:50%;background:var(--red)}
#statusDot.ok{background:var(--green)}
#statusText{font-size:13px;color:var(--text2)}

/* Login */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:400px;text-align:center}
.login-box h2{margin-bottom:24px;font-size:20px}
.login-box input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:16px}
.login-box input:focus{outline:none;border-color:var(--accent)}

/* Buttons */
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:var(--red);color:#fff;opacity:.8}.btn-danger:hover{opacity:1}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.9}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:10px 20px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);font-size:14px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:16px;font-weight:600}
.card-actions{display:flex;gap:8px}

/* Status badge */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-pending{background:#eab30822;color:var(--yellow)}
.badge-running{background:#3b82f622;color:var(--accent)}
.badge-completed{background:#22c55e22;color:var(--green)}
.badge-failed{background:#ef444422;color:var(--red)}
.badge-queued{background:#f9731622;color:var(--orange)}

/* Form */
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-size:13px;color:var(--text2);font-weight:500}
.form-group input,.form-group textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit}
.form-group textarea{min-height:200px;resize:vertical}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}

/* Table */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:12px}
.info-item{background:var(--bg);padding:12px;border-radius:8px}
.info-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.info-value{font-size:14px;font-weight:500}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:10px;font-size:14px;z-index:999;animation:slideIn .3s ease}
.toast-success{background:var(--green);color:#fff}
.toast-error{background:var(--red);color:#fff}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:90%;max-width:600px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:20px}

/* Responsive */
@media(max-width:640px){.container{padding:12px}.info-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-box">
    <h2>AI YouTube Novel Factory</h2>
    <p style="color:var(--text2);margin-bottom:24px;font-size:14px">ใส่ API Key เพื่อเข้าสู่ระบบ</p>
    <input type="password" id="apiKeyInput" placeholder="API Secret Key" autofocus>
    <button class="btn btn-primary" style="width:100%" onclick="login()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" style="display:none">
  <header>
    <h1>AI <span>YouTube</span> Novel Factory</h1>
    <div class="header-right">
      <div id="statusDot"></div>
      <span id="statusText">Connecting...</span>
      <button class="btn btn-sm btn-danger" onclick="logout()">ออกจากระบบ</button>
    </div>
  </header>

  <div class="container">
    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="novels">นิยาย</div>
      <div class="tab" data-tab="jobs">งาน</div>
      <div class="tab" data-tab="videos">วิดีโอ</div>
    </div>

    <!-- Novels Tab -->
    <div class="tab-content active" id="tab-novels">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="font-size:18px">รายการนิยาย</h2>
        <button class="btn btn-primary" onclick="showCreateModal()">+ สร้างนิยายใหม่</button>
      </div>
      <div id="novelsList"></div>
    </div>

    <!-- Jobs Tab -->
    <div class="tab-content" id="tab-jobs">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="font-size:18px">สถานะงาน</h2>
        <button class="btn btn-sm btn-primary" onclick="loadJobs()">รีเฟรช</button>
      </div>
      <div id="jobsList"></div>
    </div>

    <!-- Videos Tab -->
    <div class="tab-content" id="tab-videos">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="font-size:18px">วิดีโอที่สร้าง</h2>
        <button class="btn btn-sm btn-primary" onclick="loadVideos()">รีเฟรช</button>
      </div>
      <div id="videosList"></div>
    </div>
  </div>
</div>

<!-- Create Novel Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>สร้างนิยายใหม่</h3>
    <div class="form-group">
      <label>ชื่อเรื่อง</label>
      <input type="text" id="novelTitle" placeholder="เช่น ดินแดนมังกร">
    </div>
    <div class="form-group">
      <label>ผู้แต่ง</label>
      <input type="text" id="novelAuthor" placeholder="ชื่อผู้แต่ง" value="Unknown">
    </div>
    <div class="form-group">
      <label>เนื้อหานิยาย (ขั้นต่ำ 50 ตัวอักษร)</label>
      <textarea id="novelText" placeholder="วางเนื้อหานิยายที่นี่..."></textarea>
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end">
      <button class="btn" style="background:var(--surface2);color:var(--text)" onclick="hideCreateModal()">ยกเลิก</button>
      <button class="btn btn-primary" id="btnCreate" onclick="createNovel()">สร้าง</button>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin + '/api/v1';
let API_KEY = '';

// ── Auth ──
function login() {
  API_KEY = document.getElementById('apiKeyInput').value.trim();
  if (!API_KEY) return;
  sessionStorage.setItem('apiKey', API_KEY);
  checkHealth();
}
function logout() {
  API_KEY = '';
  sessionStorage.removeItem('apiKey');
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('apiKeyInput').value = '';
}
// Auto-login from session
(function() {
  const saved = sessionStorage.getItem('apiKey');
  if (saved) { API_KEY = saved; checkHealth(); }
})();

// ── API Helper ──
async function api(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Authorization': 'Bearer ' + API_KEY, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  if (res.status === 204) return null;
  return res.json();
}

// ── Health Check ──
async function checkHealth() {
  try {
    const data = await fetch(API_BASE + '/health').then(r => r.json());
    document.getElementById('statusDot').className = 'ok';
    document.getElementById('statusText').textContent =
      data.database + ' | ' + data.tts_engine + ' | ' + data.image_engine;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadNovels();
  } catch (e) {
    toast('เชื่อมต่อ API ไม่ได้: ' + e.message, 'error');
  }
}

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    const target = document.getElementById('tab-' + tab.dataset.tab);
    target.classList.add('active');
    if (tab.dataset.tab === 'novels') loadNovels();
    if (tab.dataset.tab === 'jobs') loadJobs();
    if (tab.dataset.tab === 'videos') loadVideos();
  });
});

// ── Novels ──
async function loadNovels() {
  const el = document.getElementById('novelsList');
  try {
    const novels = await api('/novels');
    if (!novels.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">&#128214;</div>ยังไม่มีนิยาย — กดปุ่ม "สร้างนิยายใหม่" เพื่อเริ่มต้น</div>';
      return;
    }
    el.innerHTML = novels.map(n => `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${esc(n.title)}</span>
          <div class="card-actions">
            <span class="badge badge-${n.status}">${n.status}</span>
          </div>
        </div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:12px">
          โดย ${esc(n.author)} &middot; ${timeAgo(n.created_at)}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-success" onclick="triggerPipeline('${n.id}')">&#9654; สร้างวิดีโอ</button>
          <button class="btn btn-sm btn-danger" onclick="deleteNovel('${n.id}','${esc(n.title)}')">&#128465; ลบ</button>
        </div>
      </div>
    `).join('');
  } catch (e) { el.innerHTML = '<div class="empty">Error: ' + esc(e.message) + '</div>'; }
}

function showCreateModal() { document.getElementById('createModal').classList.add('show'); }
function hideCreateModal() { document.getElementById('createModal').classList.remove('show'); }

async function createNovel() {
  const btn = document.getElementById('btnCreate');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    const data = {
      title: document.getElementById('novelTitle').value.trim(),
      author: document.getElementById('novelAuthor').value.trim() || 'Unknown',
      text: document.getElementById('novelText').value
    };
    if (!data.title) throw new Error('กรุณากรอกชื่อเรื่อง');
    await api('/novels', 'POST', data);
    toast('สร้างนิยายสำเร็จ');
    hideCreateModal();
    document.getElementById('novelTitle').value = '';
    document.getElementById('novelText').value = '';
    loadNovels();
  } catch (e) { toast(e.message, 'error'); }
  btn.disabled = false; btn.textContent = 'สร้าง';
}

async function deleteNovel(id, title) {
  if (!confirm('ลบนิยาย "' + title + '" ? (ลบทั้งหมดรวมวิดีโอ)')) return;
  try {
    await api('/novels/' + id, 'DELETE');
    toast('ลบสำเร็จ');
    loadNovels();
  } catch (e) { toast(e.message, 'error'); }
}

async function triggerPipeline(novelId) {
  try {
    const res = await api('/novels/' + novelId + '/process', 'POST');
    toast(res.message + ' (Job: ' + res.job_id.slice(0, 8) + '...)');
    loadNovels();
  } catch (e) { toast(e.message, 'error'); }
}

// ── Jobs ──
async function loadJobs() {
  const el = document.getElementById('jobsList');
  try {
    const jobs = await api('/jobs');
    if (!jobs.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">&#128736;</div>ยังไม่มีงาน</div>';
      return;
    }
    el.innerHTML = jobs.map(j => `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${j.job_type}</span>
          <span class="badge badge-${j.status}">${j.status}</span>
        </div>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">Job ID</div><div class="info-value" style="font-size:12px">${j.job_id}</div></div>
          <div class="info-item"><div class="info-label">สร้างเมื่อ</div><div class="info-value">${timeAgo(j.created_at)}</div></div>
          ${j.started_at ? '<div class="info-item"><div class="info-label">เริ่ม</div><div class="info-value">' + timeAgo(j.started_at) + '</div></div>' : ''}
          ${j.finished_at ? '<div class="info-item"><div class="info-label">เสร็จ</div><div class="info-value">' + timeAgo(j.finished_at) + '</div></div>' : ''}
          ${j.error_message ? '<div class="info-item" style="grid-column:1/-1"><div class="info-label">Error</div><div class="info-value" style="color:var(--red)">' + esc(j.error_message) + '</div></div>' : ''}
        </div>
      </div>
    `).join('');
  } catch (e) { el.innerHTML = '<div class="empty">Error: ' + esc(e.message) + '</div>'; }
}

// ── Videos ──
async function loadVideos() {
  const el = document.getElementById('videosList');
  try {
    const videos = await api('/videos');
    if (!videos.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">&#127916;</div>ยังไม่มีวิดีโอ</div>';
      return;
    }
    el.innerHTML = videos.map(v => `
      <div class="card">
        <div class="card-header">
          <span class="card-title">Part ${v.part_number}</span>
          <span class="badge badge-${v.status}">${v.status}</span>
        </div>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">Video ID</div><div class="info-value" style="font-size:12px">${v.id}</div></div>
          ${v.video_path ? '<div class="info-item"><div class="info-label">ไฟล์</div><div class="info-value" style="font-size:12px;word-break:break-all">' + esc(v.video_path) + '</div></div>' : ''}
          ${v.youtube_url ? '<div class="info-item"><div class="info-label">YouTube</div><div class="info-value"><a href="' + esc(v.youtube_url) + '" target="_blank">&#128279; ดูบน YouTube</a></div></div>' : ''}
          <div class="info-item"><div class="info-label">สร้างเมื่อ</div><div class="info-value">${timeAgo(v.created_at)}</div></div>
        </div>
      </div>
    `).join('');
  } catch (e) { el.innerHTML = '<div class="empty">Error: ' + esc(e.message) + '</div>'; }
}

// ── Helpers ──
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}
function timeAgo(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const now = new Date();
  const s = Math.floor((now - d) / 1000);
  if (s < 60) return s + ' วินาทีที่แล้ว';
  if (s < 3600) return Math.floor(s / 60) + ' นาทีที่แล้ว';
  if (s < 86400) return Math.floor(s / 3600) + ' ชั่วโมงที่แล้ว';
  return d.toLocaleDateString('th-TH') + ' ' + d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}
function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// Auto-refresh jobs every 10s if on jobs tab
setInterval(() => {
  if (document.querySelector('.tab.active')?.dataset.tab === 'jobs') loadJobs();
}, 10000);

// Enter key on login
document.getElementById('apiKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
