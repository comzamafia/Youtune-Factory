<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI YouTube Novel Factory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--accent2:#2563eb;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
.container{max-width:1100px;margin:0 auto;padding:20px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:18px;font-weight:600}
header h1 span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
#statusDot{width:10px;height:10px;border-radius:50%;background:var(--red)}
#statusDot.ok{background:var(--green)}
#statusText{font-size:13px;color:var(--text2)}

/* Login */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;text-align:center}
.login-box h2{margin-bottom:8px;font-size:20px}
.login-box p{color:var(--text2);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-error{color:var(--red);font-size:13px;margin-bottom:12px;display:none}

/* Buttons */
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:var(--red);color:#fff;opacity:.8}.btn-danger:hover{opacity:1}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.9}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn .spinner{display:none;width:14px;height:14px;border:2px solid transparent;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.btn.loading .spinner{display:inline-block}
.btn.loading{pointer-events:none;opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab{padding:10px 20px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);font-size:14px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;transition:border-color .15s}
.card:hover{border-color:var(--accent)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-title{font-size:16px;font-weight:600}
.card-meta{color:var(--text2);font-size:12px}
.card-actions{display:flex;gap:8px;flex-wrap:wrap}

/* Status badge */
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:500}
.badge-pending{background:#854d0e33;color:var(--yellow)}
.badge-processing,.badge-running{background:#1d4ed833;color:var(--accent)}
.badge-completed{background:#16653233;color:var(--green)}
.badge-failed{background:#991b1b33;color:var(--red)}
.badge-draft{background:var(--surface2);color:var(--text2)}

/* Toast */
#toastContainer{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;font-size:14px;color:#fff;animation:slideIn .3s ease;max-width:360px;box-shadow:0 4px 12px #0005}
.toast-success{background:#16a34a}
.toast-error{background:#dc2626}
.toast-info{background:#2563eb}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Media Section in novel card */
.media-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.media-section h4{font-size:13px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.media-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.media-item{position:relative;background:var(--surface2);border-radius:6px;padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:6px;color:var(--text2)}
.media-item .del-media{cursor:pointer;color:var(--red);font-size:14px;margin-left:4px}
.media-item .del-media:hover{color:#fff}
.media-icon{font-size:14px}
.upload-area{border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text2);font-size:13px}
.upload-area:hover{border-color:var(--accent);color:var(--accent)}
.upload-area.dragover{border-color:var(--green);background:var(--green)11}
.upload-area input{display:none}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* Novel text preview */
.text-preview{color:var(--text2);font-size:13px;line-height:1.6;max-height:60px;overflow:hidden;margin-bottom:8px}

/* Upload novel section */
.upload-novel{margin-bottom:24px;display:flex;gap:12px;align-items:center}
.upload-novel input[type=file]{display:none}

/* Responsive */
@media(max-width:640px){.container{padding:12px}.card{padding:14px}.login-box{width:95%;padding:28px}}
</style>
</head>
<body>

<!-- Toast container -->
<div id="toastContainer"></div>

<header>
  <h1>🎬 <span>AI YouTube</span> Novel Factory</h1>
  <div class="header-right">
    <div id="statusDot"></div>
    <span id="statusText">กำลังเชื่อมต่อ…</span>
    <button class="btn btn-sm btn-outline" id="logoutBtn" style="display:none" onclick="logout()">ออกจากระบบ</button>
  </div>
</header>

<!-- Login screen -->
<div id="loginScreen">
  <div class="login-box">
    <h2>🔐 เข้าสู่ระบบ</h2>
    <p>กรอกชื่อผู้ใช้และรหัสผ่านเพื่อเข้าใช้งาน</p>
    <div class="login-error" id="loginError"></div>
    <input type="text" id="loginUser" placeholder="ชื่อผู้ใช้" autocomplete="username">
    <input type="password" id="loginPass" placeholder="รหัสผ่าน" autocomplete="current-password">
    <button class="btn btn-primary" style="width:100%" id="loginBtn" onclick="doLogin()">
      <span class="spinner"></span> เข้าสู่ระบบ
    </button>
  </div>
</div>

<!-- Main app (hidden until logged in) -->
<div id="appMain" style="display:none">
  <div class="container">
    <div class="tabs">
      <div class="tab active" data-tab="novels">📚 นิยาย</div>
      <div class="tab" data-tab="jobs">⚙️ งาน</div>
      <div class="tab" data-tab="videos">🎬 วิดีโอ</div>
    </div>

    <!-- Novels Tab -->
    <div class="tab-content active" id="tab-novels">
      <div class="upload-novel">
        <button class="btn btn-primary" onclick="document.getElementById('novelFileInput').click()">
          📁 อัปโหลดนิยาย (.txt)
        </button>
        <input type="file" id="novelFileInput" accept=".txt,.text" onchange="uploadNovel(this)">
        <button class="btn btn-outline" onclick="loadNovels()">🔄 รีเฟรช</button>
      </div>
      <div id="novelList"></div>
    </div>

    <!-- Jobs Tab -->
    <div class="tab-content" id="tab-jobs">
      <div style="margin-bottom:16px;display:flex;gap:8px">
        <button class="btn btn-outline" onclick="loadJobs()">🔄 รีเฟรช</button>
        <button class="btn btn-sm btn-danger" id="clearJobsBtn" onclick="clearAllJobs(this)"><span class="spinner"></span> 🗑 ลบงานทั้งหมด</button>
      </div>
      <div id="jobList"></div>
    </div>

    <!-- Videos Tab -->
    <div class="tab-content" id="tab-videos">
      <div style="margin-bottom:16px">
        <button class="btn btn-outline" onclick="loadVideos()">🔄 รีเฟรช</button>
      </div>
      <div id="videoList"></div>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';
let TOKEN = sessionStorage.getItem('token') || '';

// ── Helpers ──────────────────────────────────────────────────────────────────

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function hdr() {
  return { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' };
}

function hdrFile() {
  return { 'Authorization': 'Bearer ' + TOKEN };
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, { headers: hdr(), ...opts });
  if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
  if (res.status === 204) return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

function badgeClass(s) {
  if (!s) return 'badge-draft';
  const st = s.toLowerCase();
  if (st === 'completed' || st === 'done') return 'badge-completed';
  if (st === 'failed' || st === 'error') return 'badge-failed';
  if (st === 'running' || st === 'processing') return 'badge-running';
  if (st === 'pending' || st === 'queued') return 'badge-pending';
  return 'badge-draft';
}

function fmtDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString('th-TH', {dateStyle:'short', timeStyle:'short'});
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function setLoading(btn, loading) {
  if (loading) btn.classList.add('loading');
  else btn.classList.remove('loading');
}

// ── Auth ─────────────────────────────────────────────────────────────────────

async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if (!user || !pass) { errEl.textContent = 'กรุณากรอกให้ครบ'; errEl.style.display = 'block'; return; }

  setLoading(btn, true);
  errEl.style.display = 'none';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: user, password: pass})
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Login failed');
    }
    const data = await res.json();
    TOKEN = data.token;
    sessionStorage.setItem('token', TOKEN);
    showApp();
    toast('เข้าสู่ระบบสำเร็จ!', 'success');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  } finally {
    setLoading(btn, false);
  }
}

function logout() {
  TOKEN = '';
  sessionStorage.removeItem('token');
  document.getElementById('appMain').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('logoutBtn').style.display = 'none';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appMain').style.display = 'block';
  document.getElementById('logoutBtn').style.display = '';
  loadNovels();
  checkHealth();
}

// ── Health ────────────────────────────────────────────────────────────────────

async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    document.getElementById('statusDot').className = d.status === 'healthy' ? 'ok' : '';
    document.getElementById('statusText').textContent = d.status === 'healthy' ? 'เชื่อมต่อแล้ว' : 'มีปัญหา';
  } catch {
    document.getElementById('statusDot').className = '';
    document.getElementById('statusText').textContent = 'ไม่สามารถเชื่อมต่อ';
  }
}

// ── Novels ────────────────────────────────────────────────────────────────────

async function loadNovels() {
  const el = document.getElementById('novelList');
  el.innerHTML = '<div class="empty">กำลังโหลด…</div>';
  try {
    const novels = await api('/novels?limit=100');
    if (!novels.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📚</div>ยังไม่มีนิยาย — อัปโหลดไฟล์ .txt เพื่อเริ่มต้น</div>'; return; }
    el.innerHTML = novels.map(n => novelCard(n)).join('');
    // Load media for each novel
    novels.forEach(n => loadNovelMedia(n.id));
  } catch (e) {
    el.innerHTML = '<div class="empty" style="color:var(--red)">โหลดไม่สำเร็จ: ' + e.message + '</div>';
  }
}

function novelCard(n) {
  const preview = n.text ? n.text.substring(0, 120) + '…' : '';
  return `
  <div class="card" id="novel-${n.id}">
    <div class="card-header">
      <div>
        <div class="card-title">${esc(n.title)}</div>
        <div class="card-meta">โดย ${esc(n.author)} · ${fmtDate(n.created_at)}</div>
      </div>
      <div class="card-actions">
        <span class="badge ${badgeClass(n.status)}">${esc(n.status || 'draft')}</span>
      </div>
    </div>
    ${preview ? '<div class="text-preview">' + esc(preview) + '</div>' : ''}
    <div class="card-actions" style="margin-bottom:4px">
      <button class="btn btn-sm btn-success" id="proc-${n.id}" onclick="processNovel('${n.id}', this)">
        <span class="spinner"></span> ▶ สร้างวิดีโอ
      </button>
      <button class="btn btn-sm btn-danger" onclick="deleteNovel('${n.id}', this)">
        <span class="spinner"></span> 🗑 ลบ
      </button>
    </div>
    <!-- Per-novel media section -->
    <div class="media-section">
      <h4>🖼 สื่อประกอบ <span id="media-count-${n.id}" style="color:var(--accent)"></span></h4>
      <div class="media-grid" id="media-grid-${n.id}"></div>
      <div class="upload-area" id="upload-area-${n.id}"
           ondragover="event.preventDefault();this.classList.add('dragover')"
           ondragleave="this.classList.remove('dragover')"
           ondrop="handleDrop(event,'${n.id}')"
           onclick="document.getElementById('media-input-${n.id}').click()">
        📁 คลิกหรือลากไฟล์มาวาง (รูปภาพ / วิดีโอ)
        <input type="file" id="media-input-${n.id}" multiple accept="image/*,video/*" onchange="uploadMedia('${n.id}', this.files)">
      </div>
    </div>
  </div>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

async function uploadNovel(input) {
  if (!input.files.length) return;
  const file = input.files[0];
  const fd = new FormData();
  fd.append('file', file);

  toast('กำลังอัปโหลด "' + file.name + '"…', 'info');
  try {
    const res = await fetch(API + '/novels/upload', { method: 'POST', headers: hdrFile(), body: fd });
    if (res.status === 401) { logout(); return; }
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || 'Upload failed'); }
    toast('อัปโหลดนิยายสำเร็จ!', 'success');
    loadNovels();
  } catch (e) {
    toast('อัปโหลดไม่สำเร็จ: ' + e.message, 'error');
  }
  input.value = '';
}

async function deleteNovel(id, btn) {
  if (!confirm('ต้องการลบนิยายนี้?')) return;
  setLoading(btn, true);
  try {
    await api('/novels/' + id, { method: 'DELETE' });
    toast('ลบนิยายสำเร็จ', 'success');
    const card = document.getElementById('novel-' + id);
    if (card) card.remove();
  } catch (e) {
    toast('ลบไม่สำเร็จ: ' + e.message, 'error');
  } finally {
    setLoading(btn, false);
  }
}

async function processNovel(id, btn) {
  setLoading(btn, true);
  try {
    const data = await api('/novels/' + id + '/process', { method: 'POST' });
    toast('เริ่มสร้างวิดีโอ: ' + data.message, 'success');
    // Switch to jobs tab
    switchTab('jobs');
    loadJobs();
  } catch (e) {
    toast('สร้างวิดีโอไม่สำเร็จ: ' + e.message, 'error');
  } finally {
    setLoading(btn, false);
  }
}

// ── Per-Novel Media ──────────────────────────────────────────────────────────

async function loadNovelMedia(novelId) {
  const grid = document.getElementById('media-grid-' + novelId);
  const countEl = document.getElementById('media-count-' + novelId);
  if (!grid) return;

  try {
    const data = await api('/novels/' + novelId + '/media');
    countEl.textContent = data.count > 0 ? '(' + data.count + ' ไฟล์)' : '';
    if (!data.files.length) { grid.innerHTML = '<span style="color:var(--text2);font-size:12px">ยังไม่มีสื่อ</span>'; return; }
    grid.innerHTML = data.files.map(f => `
      <div class="media-item">
        <span class="media-icon">${f.type === 'video' ? '🎬' : '🖼'}</span>
        ${esc(f.name)} <span style="opacity:.5">(${fmtSize(f.size)})</span>
        <span class="del-media" title="ลบ" onclick="deleteMedia('${novelId}','${esc(f.name)}',this)">✕</span>
      </div>
    `).join('');
  } catch {
    grid.innerHTML = '';
  }
}

async function uploadMedia(novelId, files) {
  if (!files.length) return;
  const fd = new FormData();
  for (const f of files) fd.append('files', f);

  const area = document.getElementById('upload-area-' + novelId);
  const origText = area.textContent;
  area.textContent = '⏳ กำลังอัปโหลด ' + files.length + ' ไฟล์…';

  try {
    const res = await fetch(API + '/novels/' + novelId + '/media/upload', {
      method: 'POST', headers: hdrFile(), body: fd
    });
    if (res.status === 401) { logout(); return; }
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || 'Upload failed'); }
    const data = await res.json();
    toast('อัปโหลดสื่อสำเร็จ ' + data.count + ' ไฟล์', 'success');
    loadNovelMedia(novelId);
  } catch (e) {
    toast('อัปโหลดสื่อไม่สำเร็จ: ' + e.message, 'error');
  }
  // Restore area
  area.innerHTML = '📁 คลิกหรือลากไฟล์มาวาง (รูปภาพ / วิดีโอ)<input type="file" id="media-input-' + novelId + '" multiple accept="image/*,video/*" onchange="uploadMedia(\'' + novelId + '\', this.files)">';
}

function handleDrop(e, novelId) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  if (e.dataTransfer.files.length) uploadMedia(novelId, e.dataTransfer.files);
}

async function deleteMedia(novelId, filename, el) {
  el.textContent = '…';
  try {
    await api('/novels/' + novelId + '/media/' + encodeURIComponent(filename), { method: 'DELETE' });
    toast('ลบสื่อสำเร็จ', 'success');
    loadNovelMedia(novelId);
  } catch (e) {
    toast('ลบสื่อไม่สำเร็จ: ' + e.message, 'error');
    el.textContent = '✕';
  }
}

// ── Jobs ──────────────────────────────────────────────────────────────────────

async function loadJobs() {
  const el = document.getElementById('jobList');
  el.innerHTML = '<div class="empty">กำลังโหลด…</div>';
  try {
    const jobs = await api('/jobs?limit=50');
    if (!jobs.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">⚙️</div>ยังไม่มีงาน</div>'; return; }
    el.innerHTML = jobs.map(j => `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${jobLabel(j.job_type)}</div>
            <div class="card-meta">${fmtDate(j.created_at)}${j.started_at ? ' → เริ่ม ' + fmtDate(j.started_at) : ''}${j.finished_at ? ' → เสร็จ ' + fmtDate(j.finished_at) : ''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="badge ${badgeClass(j.status)}">${statusLabel(j.status)}</span>
            <button class="btn btn-sm btn-danger" onclick="deleteJob('${j.job_id}',this)" title="ลบ">✕</button>
          </div>
        </div>
        ${j.error_message ? '<div style="color:var(--red);font-size:13px;margin-top:8px">❌ ' + esc(j.error_message) + '</div>' : ''}
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = '<div class="empty" style="color:var(--red)">โหลดไม่สำเร็จ: ' + e.message + '</div>';
  }
}

const _jobLabels = {
  full_pipeline: '🔄 ประมวลผลทั้งหมด',
  generate_script: '📝 สร้างบทจากนิยาย',
  generate_voice: '🔊 สร้างเสียงพากย์',
  generate_image: '🖼 สร้างภาพประกอบ',
  render_video: '🎬 ตัดต่อวิดีโอ',
  generate_thumbnail: '🖼 สร้างรูปปก',
  upload_youtube: '📤 อัปโหลด YouTube',
  generate_subtitle: '📝 สร้างซับไตเติ้ล',
};
function jobLabel(t) { return _jobLabels[t] || t; }

const _statusLabels = {
  queued: 'รอคิว', running: 'กำลังทำงาน', completed: 'เสร็จแล้ว',
  failed: 'ล้มเหลว', pending: 'รอดำเนินการ',
};
function statusLabel(s) { return _statusLabels[s] || s; }

// ── Videos ────────────────────────────────────────────────────────────────────

async function deleteJob(jobId, btn) {
  setLoading(btn, true);
  try {
    await api('/jobs/' + jobId, { method: 'DELETE' });
    toast('ลบงานสำเร็จ', 'success');
    loadJobs();
  } catch (e) {
    toast('ลบงานไม่สำเร็จ: ' + e.message, 'error');
    setLoading(btn, false);
  }
}

async function clearAllJobs(btn) {
  if (!confirm('ต้องการลบงานทั้งหมด?')) return;
  setLoading(btn, true);
  try {
    await api('/jobs', { method: 'DELETE' });
    toast('ลบงานทั้งหมดสำเร็จ', 'success');
    loadJobs();
  } catch (e) {
    toast('ลบไม่สำเร็จ: ' + e.message, 'error');
  } finally {
    setLoading(btn, false);
  }
}

// ── Videos (cont) ─────────────────────────────────────────────────────────────

async function loadVideos() {
  const el = document.getElementById('videoList');
  el.innerHTML = '<div class="empty">กำลังโหลด…</div>';
  try {
    const vids = await api('/videos?limit=50');
    if (!vids.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🎬</div>ยังไม่มีวิดีโอ — สร้างจากแท็บนิยาย</div>'; return; }
    el.innerHTML = vids.map(v => `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">วิดีโอ Part ${v.part_number || 1} · ${v.id.substring(0,8)}…</div>
            <div class="card-meta">${fmtDate(v.created_at)}${v.video_path ? ' · ' + esc(v.video_path) : ''}</div>
          </div>
          <span class="badge ${badgeClass(v.status)}">${esc(v.status || 'ready')}</span>
        </div>
        ${v.youtube_url ? '<div style="margin-top:8px"><a href="' + esc(v.youtube_url) + '" target="_blank">🔗 YouTube</a></div>' : ''}
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = '<div class="empty" style="color:var(--red)">โหลดไม่สำเร็จ: ' + e.message + '</div>';
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-' + name));
  if (name === 'jobs') loadJobs();
  if (name === 'videos') loadVideos();
  if (name === 'novels') loadNovels();
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

// Enter key on login
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });

// ── Init ─────────────────────────────────────────────────────────────────────

if (TOKEN) showApp();
else checkHealth();
</script>
</body>
</html>
